version: 2
project_name: goja-text

before:
  hooks:
    - go mod tidy
    - go generate ./...

# goja-text is currently a Go library plus xgoja provider/buildspec. The runnable
# dist/goja-text binary is generated from xgoja.yaml rather than a checked-in
# ./cmd package, so Goreleaser should not try to build a Go main package.
builds:
  - id: goja-text-library
    skip: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

# modelines, feel free to remove those if you don't want/use them:
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
