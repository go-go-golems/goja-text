name: goja-text
appName: goja-text
target:
  kind: xgoja
  output: dist/goja-text
packages:
  - id: goja-text
    import: github.com/go-go-golems/goja-text/pkg/xgoja/providers/text
    replace: ../..
  - id: go-go-goja-core
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/core
  - id: go-go-goja-host
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/host
commands:
  eval:
    enabled: true
  run:
    enabled: true
  repl:
    enabled: true
  jsverbs:
    enabled: true
    name: verbs
    mount: root
modules:
  - package: goja-text
    name: markdown
    as: markdown
  - package: goja-text
    name: sanitize
    as: sanitize
  - package: goja-text
    name: extract
    as: extract
  - package: goja-text
    name: template
    as: template
  - package: go-go-goja-core
    name: path
    as: path
  - package: go-go-goja-core
    name: yaml
    as: yaml
  - package: go-go-goja-host
    name: fs
    as: fs
    config:
      allow: true
jsverbs:
  - id: goja-text-bundled-verbs
    path: ./jsverbs
    embed: true
help:
  sources:
    - id: goja-text-runtime-api
      package: goja-text
      source: runtime-api
